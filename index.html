<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <title>羽毛球AI训练 - 多练</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- 加载遮罩 -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loadingText">正在初始化姿态检测引擎...</p>
  </div>

  <!-- 主容器 -->
  <div class="app-container">

    <!-- 顶部栏 -->
    <header class="app-header">
      <div class="app-title">
        🏸 羽毛球AI训练
        <span class="badge">v1.0</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" id="btnDemoToggle" onclick="App.toggleDemo()" style="font-size:13px;">
          🎮 演示模式
        </button>
        <button class="btn btn-outline" onclick="location.href='dashboard.html'">📊 数据看板</button>
      </div>
    </header>

    <!-- 演示模式提示条 -->
    <div id="demoBanner" style="display:none; background:rgba(255,152,0,0.15); border:1px solid var(--yellow); border-radius:8px; padding:10px 16px; margin-bottom:12px; font-size:14px; color:var(--yellow);">
      🎮 演示模式 — 无需摄像头，使用模拟姿态数据展示全部功能
    </div>

    <!-- 动作选择 -->
    <div class="action-selector" style="margin-bottom:12px;" id="actionSelector">
      <button class="action-btn active" data-action="high-clear">正手高远球</button>
      <button class="action-btn" data-action="forehand-lift">正手挑球</button>
      <button class="action-btn" data-action="smash">正手杀球</button>
    </div>

    <!-- 主内容 -->
    <div class="main-content">

      <!-- 左侧：摄像头区域 -->
      <div>
        <div class="video-section" id="videoSection">
          <video id="video" playsinline></video>
          <canvas id="poseCanvas"></canvas>
          <div class="video-overlay-status">
            <span class="status-dot inactive" id="statusDot"></span>
            <span id="statusText">等待启动</span>
          </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
          <button class="btn btn-primary" id="btnStart" onclick="App.startTraining()">
            ▶ 开始训练
          </button>
          <button class="btn btn-danger" id="btnStop" onclick="App.stopTraining()" disabled>
            ■ 结束训练
          </button>
          <button class="btn btn-outline" id="btnReset" onclick="App.resetCamera()">
            🔄 重置
          </button>
        </div>

        <!-- 错误提示 -->
        <div id="errorArea" class="error-message" style="display:none; margin-top:12px;"></div>
      </div>

      <!-- 右侧面板 -->
      <div class="side-panel">

        <!-- 灯光指示 -->
        <div class="light-panel">
          <div class="light-indicator" id="lightIndicator"></div>
          <div class="light-text" id="lightText">准备就绪</div>
          <div class="light-score" id="lightScore">
            -- <span class="score-unit">分</span>
          </div>
        </div>

        <!-- 提示文字 -->
        <div class="hint-text" id="hintText">
          选择动作后点击"开始训练"，将对准摄像头做技术动作
        </div>

        <!-- 关节信息 -->
        <div class="info-panel">
          <div class="info-panel-title">📐 关节角度监测</div>
          <div id="jointInfo">
            <div class="joint-info-item dimmed">
              <span class="joint-label">等待检测</span>
              <span class="joint-value">--°</span>
              <span class="joint-standard"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 训练报告弹窗 -->
  <div id="reportModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>🏆 训练报告</h3>
      <div id="reportContent"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="App.closeReport()">关闭</button>
        <button class="btn btn-primary" onclick="App.closeReport(); App.startTraining();">再来一组</button>
      </div>
    </div>
  </div>

  <!-- 初始化脚本 -->
  <script src="js/utils.js"></script>
  <script src="js/angle-calc.js"></script>
  <script src="js/action-templates.js"></script>
  <script src="js/pose-engine.js"></script>
  <script src="js/pose-simulator.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data-recorder.js"></script>

  <script>
    /**
     * 主应用逻辑
     */
    const App = {
      /** 当前选中的动作ID */
      currentAction: 'high-clear',
      /** 训练状态 */
      isTraining: false,
      /** 演示模式（无摄像头） */
      demoMode: false,
      /** Camera实例 */
      camera: null,
      /** 当前活跃的引擎（PoseEngine 或 PoseSimulator） */
      engine: null,
      /** 视频元素 */
      video: null,
      /** Canvas元素 */
      canvas: null,

      /**
       * 初始化
       */
      async init() {
        this.video = document.getElementById('video');
        this.canvas = document.getElementById('poseCanvas');

        // 设置Canvas尺寸
        this.canvas.width = 640;
        this.canvas.height = 480;

        // 初始化Feedback模块
        Feedback.init(this.canvas, {
          lightEl: document.getElementById('lightIndicator'),
          hintEl: document.getElementById('hintText'),
          infoEl: document.getElementById('jointInfo'),
          width: 640,
          height: 480
        });

        // 动作选择
        document.querySelectorAll('.action-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentAction = btn.dataset.action;
            if (this.isTraining) {
              this._updateFeedback();
            }
          });
        });

        // 初始化DataRecorder
        await DataRecorder.openDB();

        // 默认引擎为PoseEngine
        this.engine = PoseEngine;

        // 预加载MediaPipe
        const ready = await PoseEngine.init();
        if (ready) {
          this.hideLoading();
          this.setStatus('ready', '就绪，请开始训练');
        } else {
          // MediaPipe加载失败，自动启用演示模式
          this.showError('MediaPipe加载失败，可以切换演示模式查看功能');
          this._enableDemo();
        }
      },

      /**
       * 切换演示模式
       */
      toggleDemo() {
        if (this.isTraining) {
          this.showError('请先结束当前训练');
          return;
        }

        if (this.demoMode) {
          this._disableDemo();
        } else {
          this._enableDemo();
        }
      },

      _enableDemo() {
        this.demoMode = true;
        this.engine = PoseSimulator;
        this.canvas.classList.remove('mirror'); // 演示模式不镜像
        document.getElementById('btnDemoToggle').textContent = '🎮 真人模式';
        document.getElementById('btnDemoToggle').style.borderColor = 'var(--yellow)';
        document.getElementById('btnDemoToggle').style.color = 'var(--yellow)';
        document.getElementById('demoBanner').style.display = 'block';
        document.getElementById('hintText').textContent = '🎮 演示模式已开启，点击"开始训练"查看效果';
        this.hideError();
        this.setStatus('ready', '演示模式已就绪');
        console.log('[App] 已切换至演示模式');
      },

      _disableDemo() {
        this.demoMode = false;
        this.engine = PoseEngine;
        this.canvas.classList.add('mirror'); // 真人模式需要镜像（与视频同步）
        document.getElementById('btnDemoToggle').textContent = '🎮 演示模式';
        document.getElementById('btnDemoToggle').style.borderColor = '';
        document.getElementById('btnDemoToggle').style.color = '';
        document.getElementById('demoBanner').style.display = 'none';
        this.setStatus('ready', '就绪，请开始训练');
        console.log('[App] 已切换至真人模式');
      },

      /**
       * 启动训练
       */
      async startTraining() {
        if (this.isTraining) return;

        try {
          this.setStatus('loading', '启动中...');

          const action = ActionTemplates.get(this.currentAction);
          if (!action) {
            this.showError('未找到动作模板');
            return;
          }

          if (this.demoMode) {
            // ----- 演示模式：用模拟器 -----
            PoseSimulator.setAction(this.currentAction);
            this.camera = await PoseSimulator.start(
              this.video,
              (results) => this._onPoseResults(results, PoseSimulator),
              (err) => this._onPoseError(err)
            );
          } else {
            // ----- 真人模式：用摄像头 + MediaPipe -----
            if (!PoseEngine._initialized) {
              this.showError('姿态检测引擎未就绪');
              return;
            }
            this.camera = await PoseEngine.start(
              this.video,
              (results) => this._onPoseResults(results, PoseEngine),
              (err) => this._onPoseError(err)
            );
          }

          if (!this.camera) {
            this.showError(this.demoMode ? '模拟器启动失败' : '摄像头启动失败，请检查权限');
            return;
          }

          this.isTraining = true;
          document.getElementById('btnStart').disabled = true;
          document.getElementById('btnStop').disabled = false;
          this.hideError();

          // 开始记录训练
          DataRecorder.startSession(this.currentAction);

          this.setStatus('active', '训练中...');
          this.updateLight('unknown', '训练中');

          console.log(`[App] 训练开始 - 动作: ${action.name} - 模式: ${this.demoMode ? '演示' : '摄像头'}`);

        } catch (err) {
          console.error('[App] 训练启动失败:', err);
          this.showError('启动失败: ' + (err.message || err));
          this.isTraining = false;
          document.getElementById('btnStart').disabled = false;
          document.getElementById('btnStop').disabled = true;
        }
      },

      /**
       * 停止训练
       */
      async stopTraining() {
        if (!this.isTraining) return;

        this.isTraining = false;

        if (this.demoMode) {
          PoseSimulator.stop();
        } else {
          PoseEngine.stop();
        }

        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;

        this.setStatus('inactive', '已停止');

        // 结束记录
        const session = await DataRecorder.endSession();
        if (session) {
          this.showReport(session);
        }

        Feedback.reset();
        this.updateLight('unknown', '训练结束');
      },

      /**
       * 重置
       */
      async resetCamera() {
        if (this.isTraining) {
          await this.stopTraining();
        }
        PoseEngine.stop();
        PoseSimulator.stop();
        if (this.camera) {
          try { this.camera.stop(); } catch(e) {}
          this.camera = null;
        }

        const msg = this.demoMode ? '演示模式已重置' : '已重置';
        this.setStatus('inactive', msg);
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        Feedback.reset();
      },

      /**
       * 每一帧检测结果回调
       */
      _onPoseResults(results, engine) {
        if (!this.isTraining) return;

        const landmarks = results.poseLandmarks;
        if (!landmarks) return;

        // 演示模式：直接使用预计算的真实角度（绕过AngleCalc间接推算）
        // 真人模式：从关键点实时计算角度
        const angles = this.demoMode && results._demoAngles
          ? results._demoAngles
          : AngleCalc.getAll(landmarks);

        // 评估动作
        const evalResult = ActionTemplates.evaluateSession(this.currentAction, angles);

        // 记录数据
        DataRecorder.recordFrame(angles, evalResult);

        // 更新反馈
        Feedback.update(landmarks, angles, this.currentAction, evalResult);

        // 更新灯光
        this.updateLight(evalResult.overallLevel, '', evalResult.score);

        // 更新分数
        const avgScore = DataRecorder.getCurrentAverage();
        document.getElementById('lightScore').innerHTML = `${avgScore} <span class="score-unit">分</span>`;

        // 状态
        const modeLabel = this.demoMode ? '演示' : '检测';
        this.setStatus('active', `${modeLabel}中 (${engine.frameCount}帧)`);
      },

      /**
       * 检测错误回调
       */
      _onPoseError(err) {
        console.error('[App] 检测错误:', err);
        if (this.isTraining) {
          this.showError('检测异常: ' + (err.message || err));
        }
      },

      /**
       * 更新反馈（切换动作时）
       */
      _updateFeedback() {
        const landmarks = this.engine?.getLandmarks();
        if (landmarks) {
          const angles = AngleCalc.getAll(landmarks);
          const evalResult = ActionTemplates.evaluateSession(this.currentAction, angles);
          Feedback.update(landmarks, angles, this.currentAction, evalResult);
        }
      },

      /**
       * 更新状态指示
       */
      setStatus(state, text) {
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        dot.className = 'status-dot ' + (state === 'active' ? 'active' : 'inactive');
        txt.textContent = text;
      },

      /**
       * 更新灯光
       */
      updateLight(level, text, score) {
        const colors = {
          green: '#4CAF50',
          yellow: '#FF9800',
          red: '#F44336',
          unknown: '#9E9E9E'
        };
        const texts = {
          green: '动作规范',
          yellow: '轻度偏差',
          red: '严重偏离',
          unknown: text || '检测中'
        };

        const indicator = document.getElementById('lightIndicator');
        indicator.style.backgroundColor = colors[level] || colors.unknown;
        indicator.style.boxShadow = level !== 'unknown' ? `0 0 30px ${colors[level]}` : 'none';

        document.getElementById('lightText').textContent = texts[level] || text;
      },

      /**
       * 显示训练报告
       */
      showReport(session) {
        const action = ActionTemplates.get(session.actionType);
        const container = document.getElementById('reportContent');

        const scoreColor = session.overallScore >= 80 ? 'var(--green)' : (session.overallScore >= 60 ? 'var(--yellow)' : 'var(--red)');
        const durationSec = Math.round(session.duration / 1000);
        const min = Math.floor(durationSec / 60);
        const sec = durationSec % 60;

        let jointHtml = '';
        if (action) {
          for (const [jointName, jointCfg] of Object.entries(action.joints)) {
            const avg = session.jointAverages[jointName];
            if (avg !== undefined) {
              const deviation = Math.abs(avg - jointCfg.standard);
              const level = deviation <= jointCfg.tolerance * 0.6 ? 'green' : (deviation <= jointCfg.tolerance ? 'yellow' : 'red');
              const color = { green: 'var(--green)', yellow: 'var(--yellow)', red: 'var(--red)' }[level];
              jointHtml += `<div class="report-detail-item">
                <span>${jointCfg.label}</span>
                <span style="color:${color}">${avg}° (标准${jointCfg.standard}°)</span>
              </div>`;
            }
          }
        }

        container.innerHTML = `
          <div class="report-section">
            <div class="report-score-big" style="color:${scoreColor}">
              ${session.overallScore}<span style="font-size:24px">分</span>
            </div>
            <p style="text-align:center;color:var(--text-dim);margin-top:4px;">
              ${session.overallScore >= 60 ? '✅ 达标' : '❌ 未达标'} ·
              训练时长 ${min}分${sec}秒 ·
              有效帧 ${session.validFrames}/${session.totalFrames}
            </p>
          </div>
          <div class="report-section">
            <h4>动作类型</h4>
            <p style="font-size:16px;font-weight:600;">${session.actionName}</p>
          </div>
          <div class="report-section">
            <h4>关节平均角度</h4>
            ${jointHtml || '<p style="color:var(--text-dim)">无有效数据</p>'}
          </div>
          <div class="report-section">
            <h4>训练时间</h4>
            <p>${session.date} · ${min}分${sec}秒</p>
          </div>
        `;

        document.getElementById('reportModal').style.display = 'flex';
      },

      closeReport() {
        document.getElementById('reportModal').style.display = 'none';
      },

      showLoading(text) {
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').textContent = text || '加载中...';
      },

      hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
      },

      showError(msg) {
        const el = document.getElementById('errorArea');
        el.textContent = msg;
        el.style.display = 'block';
      },

      hideError() {
        document.getElementById('errorArea').style.display = 'none';
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
