<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <title>彗羽AI - 实时动作识别</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display:none">
  <div class="loading-spinner"></div>
  <p class="loading-text" id="loadingText">初始化中...</p>
</div>

<!-- 启动按钮（点击即请求摄像头+开始预览） -->
<div id="permOverlay" class="perm-overlay">
  <div class="perm-card">
    <div class="perm-icon">🏸</div>
    <button class="perm-btn" id="permBtn" onclick="App.requestCamera()">开启摄像头训练</button>
    <p class="perm-desc">画面仅用于实时姿态识别，不上传不存储</p>
  </div>
</div>

<!-- ===== 全屏封面（和小程序一模一样） ===== -->
<div class="page">

  <!-- 演示模式提示条 -->
  <div id="demoBanner" class="demo-banner" style="display:none">
    🎮 演示模式 — 使用模拟姿态数据展示全部功能
  </div>

  <!-- 全屏摄像头/演示区域 -->
  <div class="fullscreen-video">
    <!-- 摄像头 -->
    <video id="video" playsinline class="camera-full"></video>
    <!-- 演示占位 -->
    <div id="demoPlaceholder" class="demo-placeholder" style="display:none">
      <span class="demo-icon-text">🏸</span>
      <span class="demo-sub-text">演示模式</span>
    </div>
    <!-- 骨架画布 -->
    <canvas id="poseCanvas" class="pose-canvas-full"></canvas>

    <!-- ===== 顶部栏 ===== -->
    <div class="overlay-top">
      <div class="top-left">
        <span class="icon-btn" id="btnModeToggle" onclick="App.toggleMode()">📷</span>
        <span class="icon-btn" id="btnCollectMode" onclick="App.toggleCollect()" style="font-size:13px;width:44px;">📊</span>
      </div>
      <div class="top-center">
        <span class="action-title" id="actionLabel">高远球</span>
      </div>
      <div class="top-right">
        <span class="icon-btn" id="btnCollectBadge" style="display:none;background:rgba(0,188,212,0.3);border-color:#4DD0E1;font-size:11px;width:auto;padding:0 8px;">采集</span>
      </div>
    </div>

    <!-- 翻转摄像头按钮 -->
    <span class="flip-side-btn" id="flipBtn" onclick="App.toggleCamera()">🔄</span>

    <!-- ===== 底部控件组（未训练时） ===== -->
    <div class="bottom-group" id="bottomGroup">
      <!-- 状态 -->
      <div class="status-chip">
        <span class="status-dot-active" id="statusDot"></span>
        <span id="statusText">就绪，请开始训练</span>
        <span id="demoBadge" style="display:none;margin-left:6px;color:#FF9800;">🎮</span>
      </div>

      <!-- 动作选择 -->
      <div class="action-row">
        <span class="action-pill active" data-action="high-clear" onclick="App.selectAction(this)">高远球</span>
        <span class="action-pill" data-action="forehand-lift" onclick="App.selectAction(this)">挑球</span>
        <span class="action-pill" data-action="forehand-serve" onclick="App.selectAction(this)">发球</span>
        <span class="action-pill" data-action="smash" onclick="App.selectAction(this)">杀球</span>
      </div>

      <!-- 开始按钮 -->
      <span class="big-btn start-btn" id="btnStart" onclick="App.startTraining()">
        <span class="big-btn-icon">▶</span>
        <span class="big-btn-text">开始训练</span>
      </span>
    </div>
  </div>

  <!-- ===== 底部面板（训练时显示） ===== -->
  <div class="bottom-panel" id="bottomPanel" style="display:none">
    <!-- 突出的大红结束按钮 -->
    <div class="bp-stop" onclick="App.stopTraining()">
      <span class="bp-stop-text">■ 结束本次训练</span>
    </div>

    <!-- 提示文字 -->
    <div class="hint-row" id="hintRow" style="border-left-color:#8892a8;">
      <span id="hintText" style="color:#8892a8;">等待检测...</span>
    </div>

    <!-- 实时分数 -->
    <div style="text-align:center;padding:6px 0;">
      <span id="scoreNum" style="font-size:32px;font-weight:700;color:#fff;">--</span>
      <span style="font-size:14px;color:#8892a8;"> 分</span>
    </div>

    <!-- 关节角度网格 -->
    <div class="bp-scroll">
      <div class="joint-grid" id="jointGrid"></div>
    </div>
  </div>
</div>

<!-- 报告弹窗 -->
<div id="reportModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>🏆 训练报告</h3>
    <div id="reportContent"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="modal-btn cancel" onclick="App.closeReport()">关闭</button>
      <button class="modal-btn confirm" onclick="App.closeReport();App.startTraining();">再来一组</button>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/angle-calc.js"></script>
<script src="js/action-templates.js"></script>
<script src="js/pose-engine.js"></script>
<script src="js/pose-simulator.js"></script>
<script src="js/feedback.js"></script>
<script src="js/data-recorder.js"></script>

<script>
const actionNames = { 'high-clear': '高远球', 'forehand-lift': '挑球', 'forehand-serve': '发球', 'smash': '杀球' };
const el = id => document.getElementById(id);

const App = {
  currentAction: 'high-clear',
  isTraining: false,
  demoMode: false,
  camera: null,
  video: null,
  canvas: null,
  engine: null,
  scores: [],
  angleSum: {},
  session: null,
  _facingMode: 'environment',
  _collectMode: false,  // false=训练模式(有评分) true=采集模式(只录角度)
  _timer: null,
  _frameCount: 0,

  async init() {
    this.video = el('video');
    this.canvas = el('poseCanvas');
    this.canvas.width = 960; this.canvas.height = 720;
    await DataRecorder.openDB();
    this.engine = PoseEngine;

    // 预加载MediaPipe（静默进行）
    PoseEngine.init();

    el('statusText').textContent = '就绪，请开始训练';
    el('flipBtn').textContent = '🔙';
  },

  /** 用户点击后打开摄像头并直接开始训练 */
  async requestCamera() {
    el('loadingOverlay').style.display = 'flex';
    el('loadingText').textContent = '开启摄像头...';
    el('permOverlay').style.display = 'none';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: 640, height: 480 },
        audio: false
      });
      this.video.srcObject = stream;
      await this.video.play();
      this._previewStream = stream;
      el('loadingOverlay').style.display = 'none';

      // 直接开始训练（只需点一次）
      this.startTraining();
    } catch(e) {
      el('loadingOverlay').style.display = 'none';
      el('permOverlay').style.display = 'flex';
    }
  },

  selectAction(el) {
    document.querySelectorAll('.action-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    this.currentAction = el.dataset.action;
    el('actionLabel').textContent = actionNames[el.dataset.action] || el.dataset.action;
  },

  /** 切换采集模式（不评分，只录角度作为常模） */
  toggleCollect() {
    if (this.isTraining) { alert('请先结束当前训练'); return; }
    this._collectMode = !this._collectMode;
    el('btnCollectMode').textContent = this._collectMode ? '✅' : '📊';
    el('btnCollectBadge').style.display = this._collectMode ? '' : 'none';
    el('btnCollectMode').style.borderColor = this._collectMode ? '#4DD0E1' : '';
    el('statusText').textContent = this._collectMode ? '📊 采集模式 — 不评分，记录角度数据' : '就绪，请开始训练';
  },

  toggleMode() {
    if (this.isTraining) { alert('请先结束当前训练'); return; }
    this.demoMode = !this.demoMode;
    this.engine = this.demoMode ? PoseSimulator : PoseEngine;

    el('demoBanner').style.display = this.demoMode ? 'block' : 'none';
    el('demoBadge').style.display = this.demoMode ? 'inline' : 'none';
    el('demoPlaceholder').style.display = this.demoMode ? 'flex' : 'none';
    this.video.style.display = this.demoMode ? 'none' : '';
    this.canvas.classList.toggle('mirror', !this.demoMode);

    el('btnModeToggle').textContent = this.demoMode ? '🎮' : '📷';
    el('flipBtn').style.display = this.demoMode ? 'none' : '';
    el('flipBtn').textContent = '🔙';
    el('statusText').textContent = this.demoMode ? '演示模式已就绪' : '就绪，请开始训练';
  },

  toggleCamera() {
    this._facingMode = this._facingMode === 'user' ? 'environment' : 'user';
    const isFront = this._facingMode === 'user';
    const mirror = isFront ? 'scaleX(-1)' : 'scaleX(1)';

    if (this.isTraining) {
      // 训练中热切换摄像头
      PoseEngine.switchCamera(this._facingMode).then(ok => {
        if (ok) {
          this.video.style.transform = mirror;
          // Canvas不再CSS镜像，文字由_drawOnCamera内部处理
          el('flipBtn').textContent = isFront ? '🤳' : '🔙';
        }
      });
    } else {
      // 未训练时重新获取预览
      if (this._previewStream) { this._previewStream.getTracks().forEach(t => t.stop()); }
      navigator.mediaDevices.getUserMedia({ video: { facingMode: this._facingMode, width: 640, height: 480 }, audio: false }).then(stream => {
        this._previewStream = stream;
        this.video.srcObject = stream;
        this.video.play();
        this.video.style.transform = mirror;
    }
  },

  async startTraining() {
    if (this.isTraining) return;
    this._frameCount = 0;
    this.scores = [];
    this.angleSum = {};
    this.session = { startTime: Date.now(), validFrames: 0 };

    const action = ActionTemplates.get(this.currentAction);
    if (!action) return;

    // 先释放预览流，再让PoseEngine接管摄像头
    if (this._previewStream) {
      this._previewStream.getTracks().forEach(t => t.stop());
      this._previewStream = null;
    }

    if (this.demoMode) {
      PoseSimulator.setAction(this.currentAction);
      this.camera = await PoseSimulator.start(this.video, (r) => this._onFrame(r));
    } else {
      // 把预览流直接给PoseEngine，不需要重新获取权限
      this.camera = await PoseEngine.start(this.video, (r) => this._onFrame(r), () => {}, this._facingMode, this._previewStream || undefined);
      this._previewStream = null;
    }
    if (!this.camera) { alert('启动失败，请确认摄像头权限'); return; }

    this.isTraining = true;
    el('bottomGroup').style.display = 'none';
    el('bottomPanel').style.display = 'flex';
    el('flipBtn').style.display = 'none';
    el('statusText').textContent = this.demoMode ? '演示中...' : '检测中...';
  },

  _onFrame(results) {
    if (!this.isTraining) return;
    this._frameCount++;

    let angles, landmarks;
    if (this.demoMode && results._demoAngles) {
      angles = results._demoAngles;
    } else {
      landmarks = results.poseLandmarks;
      if (!landmarks) return;
      // 过滤无人
      let valid = 0;
      [11,12,23,24].forEach(i => { if (landmarks[i] && landmarks[i].visibility > 0.5) valid++; });
      if (valid < 2) {
        el('scoreNum').textContent = '--';
        el('hintText').textContent = '未检测到人体，请站到镜头前';
        el('hintRow').style.borderLeftColor = '#9E9E9E';
        return;
      }
      angles = AngleCalc.getAll(landmarks);
      if (!angles) return;

      if (this._frameCount % 5 === 0) {
        for (const [j,d] of Object.entries(angles)) {
          if (d) { if (!this.angleSum[j]) this.angleSum[j]=[]; this.angleSum[j].push(d.angle); }
        }
      }
    }

    const ev = ActionTemplates.evaluateSession(this.currentAction, angles);
    if (!ev) return;
    this.scores.push(ev.score);
    this.session.validFrames++;

    // 更新UI：底部面板的分数、提示、关节角度
    if (this._collectMode) {
      // 采集模式：不显示分数
      el('scoreNum').textContent = '--';
      el('scoreNum').style.color = '#4DD0E1';
      el('hintText').textContent = '📊 采集模式中，做完整挥拍动作';
      el('hintText').style.color = '#4DD0E1';
      el('hintRow').style.borderLeftColor = '#4DD0E1';
    } else {
      // 训练模式：正常显示分数
      el('scoreNum').textContent = ev.score;
      el('scoreNum').style.color = ev.overallLevel === 'green' ? '#4CAF50' : (ev.overallLevel === 'red' ? '#F44336' : '#FF9800');
    }

    // 提示
    const action = ActionTemplates.get(this.currentAction);
    if (action && !this._collectMode) {
      // 训练模式：显示偏差提示
      let worst = null, worstDev = 0;
      for (const [jn, jc] of Object.entries(action.joints)) {
        const ad = angles[jn];
        if (ad) {
          const dev = Math.abs(ad.angle - jc.standard);
          if (dev > jc.tolerance * 0.6 && dev > worstDev) { worst = { name: jc.label, angle: ad.angle, std: jc.standard, tol: jc.tolerance, diff: Math.round(ad.angle - jc.standard) }; worstDev = dev; }
        }
      }
      if (worst) {
        el('hintText').textContent = `${worst.name}偏差${Math.abs(worst.diff)}° (${worst.angle}°, 标准${worst.std}°±${worst.tol}°)`;
        el('hintText').style.color = worstDev > worst.tol ? '#F44336' : '#FF9800';
        el('hintRow').style.borderLeftColor = worstDev > worst.tol ? '#F44336' : '#FF9800';
      } else {
        el('hintText').textContent = '动作规范，继续保持！';
        el('hintText').style.color = '#4CAF50';
        el('hintRow').style.borderLeftColor = '#4CAF50';
      }
    }

    // 关节角度
    let gridHtml = '';
    for (const [jn, jc] of Object.entries(action.joints)) {
      const ad = angles[jn];
      const val = ad ? ad.angle+'°' : '--°';
      const color = this._collectMode ? '#4DD0E1' : (ad ? (Math.abs(ad.angle - jc.standard) <= jc.tolerance*0.6 ? '#4CAF50' : (Math.abs(ad.angle - jc.standard) <= jc.tolerance ? '#FF9800' : '#F44336')) : '#556');
      gridHtml += `<div class="joint-cell"><span class="jc-label">${jc.label}</span><span class="jc-value" style="color:${color}">${val}</span></div>`;
    }
    el('jointGrid').innerHTML = gridHtml;

    el('statusText').textContent = (this.demoMode ? '演示' : '检测') + '中 (' + this._frameCount + '帧)';

    // 在摄像头上绘制骨架+角度标签
    this._drawOnCamera(landmarks || results.poseLandmarks, angles);
  },

  /** 在Canvas上绘制骨架+角度标签（手动镜像，文字不翻） */
  _drawOnCamera(landmarks, angles) {
    if (!this.canvas || !landmarks) return;
    const ctx = this.canvas.getContext('2d');
    const w = this.canvas.width || 960;
    const h = this.canvas.height || 720;
    ctx.clearRect(0, 0, w, h);
    if (!landmarks) return;

    const isMirror = this._facingMode === 'user';
    const mx = (px) => isMirror ? (w - px * w) : px * w;

    // 骨架连线
    const connections = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
    ctx.lineCap = 'round';
    ctx.lineWidth = 2;
    for (const [i, j] of connections) {
      const a = landmarks[i], b = landmarks[j];
      if (a && b && a.visibility > 0.5 && b.visibility > 0.5) {
        ctx.beginPath(); ctx.moveTo(mx(a.x), a.y * h); ctx.lineTo(mx(b.x), b.y * h);
        ctx.strokeStyle = '#00E5FF'; ctx.stroke();
      }
    }
    // 关键点
    for (const lm of landmarks) {
      if (lm && lm.visibility > 0.5) {
        ctx.beginPath(); ctx.arc(mx(lm.x), lm.y * h, 3, 0, 2 * Math.PI);
        ctx.fillStyle = '#FF6B6B'; ctx.fill();
      }
    }

    // 角度标签（不翻转）
    if (!angles || !this.currentAction) return;
    const action = ActionTemplates.get(this.currentAction);
    if (!action) return;
    const labelPos = {
      rightElbow: () => landmarks[14] ? { x: mx(landmarks[14].x), y: landmarks[14].y * h - 16 } : null,
      rightShoulder: () => landmarks[12] ? { x: mx(landmarks[12].x), y: landmarks[12].y * h - 16 } : null,
      rightHip: () => landmarks[24] ? { x: mx(landmarks[24].x), y: landmarks[24].y * h - 16 } : null,
      rightKnee: () => landmarks[26] ? { x: mx(landmarks[26].x), y: landmarks[26].y * h - 16 } : null,
      trunkRotation: () => landmarks[11] && landmarks[12] ? { x: (mx(landmarks[11].x) + mx(landmarks[12].x)) / 2, y: ((landmarks[11].y + landmarks[12].y) / 2) * h - 30 } : null,
      trunkLean: () => landmarks[23] && landmarks[24] ? { x: (mx(landmarks[23].x) + mx(landmarks[24].x)) / 2, y: ((landmarks[23].y + landmarks[24].y) / 2) * h + 20 } : null
    };
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    for (const [jn, jc] of Object.entries(action.joints)) {
      const ad = angles[jn];
      if (!ad) continue;
      const pos = labelPos[jn] ? labelPos[jn]() : null;
      if (!pos) continue;
      const dev = Math.abs(ad.angle - jc.standard);
      const color = dev <= jc.tolerance * 0.6 ? '#4CAF50' : (dev <= jc.tolerance ? '#FF9800' : '#F44336');
      ctx.fillStyle = color;
      ctx.fillText(`${jc.label}: ${ad.angle}°`, pos.x, pos.y);
    }
    ctx.shadowBlur = 0;
  },

  async stopTraining() {
    this.isTraining = false;
    if (this.demoMode) PoseSimulator.stop(); else PoseEngine.stop();
    Feedback.reset();
    el('bottomGroup').style.display = 'flex';
    el('bottomPanel').style.display = 'none';
    if (!this.demoMode) el('flipBtn').style.display = '';
    el('statusText').textContent = '已停止 · 点开始重新训练';

    const duration = Math.round((Date.now() - this.session.startTime)/1000);
    const action = ActionTemplates.get(this.currentAction);
    const min = Math.floor(duration/60);
    const sec = duration % 60;

    // 采集模式：保存为常模数据，不显示评分
    if (this._collectMode) {
      // 计算各关节平均值
      const avgAngles = {};
      if (action && this.angleSum) {
        for (const [j,jc] of Object.entries(action.joints)) {
          const vals = this.angleSum[j];
          if (vals && vals.length) {
            avgAngles[j] = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
          }
        }
      }

      // 保存到本地常模数据
      const allNorms = JSON.parse(localStorage.getItem('normData') || '{}');
      const existing = allNorms[this.currentAction] || {};
      const count = (existing._count || 0) + 1;
      for (const [jn, angle] of Object.entries(avgAngles)) {
        if (!existing[jn]) {
          existing[jn] = { sum: angle, sumSq: angle * angle, count: 1, avg: angle, std: 0 };
        } else {
          existing[jn].sum = (existing[jn].sum || existing[jn].avg * (count - 1)) + angle;
          existing[jn].sumSq = (existing[jn].sumSq || existing[jn].avg * existing[jn].avg * (count - 1)) + angle * angle;
          existing[jn].count = count;
          existing[jn].avg = Math.round(existing[jn].sum / existing[jn].count);
          if (existing[jn].count > 1) {
            const variance = (existing[jn].sumSq - (existing[jn].sum * existing[jn].sum) / existing[jn].count) / (existing[jn].count - 1);
            existing[jn].std = Math.round(Math.sqrt(Math.max(0, variance)));
          }
        }
      }
      existing._count = count;
      allNorms[this.currentAction] = existing;
      localStorage.setItem('normData', JSON.stringify(allNorms));

      // 显示采集完成的报告（无分数）
      let html = `<div style="text-align:center;padding:10px 0;"><span style="font-size:36px;font-weight:700;color:#4DD0E1;">${count}次</span><span style="font-size:16px;color:#8892a8;"> 采集</span></div>`;
      html += `<p style="text-align:center;color:#8892a8;">${min}分${sec}秒 | ${Object.keys(avgAngles).length}个关节</p>`;
      html += `<div style="margin-top:12px;"><h4 style="font-size:13px;color:#8892a8;margin-bottom:8px;">关节平均角度</h4>`;
      if (action) {
        for (const [j,jc] of Object.entries(action.joints)) {
          const v = avgAngles[j];
          if (v !== undefined) {
            html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:#4DD0E1;font-size:13px;"><span>${jc.label}</span><span>${v}°</span></div>`;
          }
        }
      }
      html += `</div>`;
      el('reportContent').innerHTML = html;
      el('reportModal').style.display = 'flex';
      return;
    }

    // 训练模式：正常显示评分报告
    const avgScore = this.scores.length > 0 ? Math.round(this.scores.reduce((a,b)=>a+b,0)/this.scores.length) : 0;
    let html = `<div class="report-score-big" style="color:${avgScore>=80?'#4CAF50':(avgScore>=60?'#FF9800':'#F44336')}">${avgScore}<span style="font-size:20px;">分</span></div>`;
    html += `<p style="text-align:center;color:#8892a8;margin-top:4px;">${avgScore>=60?'✅达标':'❌未达标'} · ${min}分${sec}秒 · ${this.session.validFrames}帧</p>`;
    html += `<div style="margin-top:14px;"><h4 style="font-size:13px;color:#8892a8;margin-bottom:8px;">动作类型</h4><p style="font-size:15px;font-weight:600;">${action?.name||this.currentAction}</p></div>`;
    html += `<div style="margin-top:12px;"><h4 style="font-size:13px;color:#8892a8;margin-bottom:8px;">关节平均分析</h4>`;
    if (action && this.angleSum) {
      for (const [j,jc] of Object.entries(action.joints)) {
        const vals = this.angleSum[j];
        if (vals && vals.length) {
          const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
          const diff = avg - jc.standard;
          const level = Math.abs(diff) <= jc.tolerance*0.6 ? 'green' : (Math.abs(diff) <= jc.tolerance ? 'yellow' : 'red');
          const color = {green:'#4CAF50',yellow:'#FF9800',red:'#F44336'}[level];
          html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:${color};font-size:13px;"><span>${jc.label}</span><span>${avg}° (${diff>0?'+'+diff:diff}°)</span></div>`;
        }
      }
    }
    html += `</div>`;
    el('reportContent').innerHTML = html;
    el('reportModal').style.display = 'flex';
  },

  closeReport() { el('reportModal').style.display = 'none'; }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
